# Workflow for building and deploying a GitBook mirror to GitHub Pages
name: Deploy GitBook Mirror with Preprocessing

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preprocess GitBook Syntax
        # This step cleans the Markdown files so Jekyll doesn't crash on GitBook-specific tags
        run: |
          # 1. FIX EMBED TAGS: Convert {% embed url="..." %} to standard <iframe>
          # This regex handles single/double quotes and flexible spacing to prevent the 'Unknown tag' error.
          find . -type f -name "*.md" -print0 | xargs -0 sed -i -E 's/\{%[[:space:]]*embed[[:space:]]+url=["'\'']([^"'\'']+)["'\''][[:space:]]*%\}/<div class="video-container" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;margin:20px 0;"><iframe src="\1" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen><\/iframe><\/div>/g'
          
          # 2. EMERGENCY CLEANUP: Force-delete any remaining {% embed ... %} tags that missed the first pass
          find . -type f -name "*.md" -print0 | xargs -0 sed -i -E 's/\{%[[:space:]]*embed[^%]*%\}/<!-- Removed GitBook Embed -->/g'

          # 3. FIX DESCRIPTION: Style the 2nd line of every file as an italicized lead paragraph (Primer theme style)
          find . -type f -name "*.md" -print0 | xargs -0 sed -i '2s/^/> _/; 2s/$/ _ <br>/'
          
          # 4. FIX HINTS: Convert GitBook {% hint %} blocks into standard blockquotes
          find . -type f -name "*.md" -print0 | xargs -0 sed -i 's/\{%[[:space:]]*hint[^%]*%\}/<blockquote><strong>Note:<\/strong><br>/g'
          find . -type f -name "*.md" -print0 | xargs -0 sed -i 's/\{%[[:space:]]*endhint[[:space:]]*%\}/<\/blockquote>/g'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
