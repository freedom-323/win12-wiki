name: Deploy GitBook Mirror to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preprocess GitBook Syntax
        run: |
          # Use newline as separator to handle filenames with spaces
          IFS=$'\n'
          for file in $(find . -type f -name "*.md"); do
            echo "Processing $file..."

            # 1. Fix Bold & Entities: Replace &#x20; with real spaces
            # This ensures **Bold** syntax isn't broken by hidden characters
            sed -i 's/&#x20;/ /g' "$file" || true

            # 2. Force Clickable Links: Wrap raw https links in < > 
            # This ensures https://github.com... becomes a clickable link in Jekyll
            sed -i -E 's|([^<"'\''@])(https?://[a-zA-Z0-9\.\/\-_?=&%#]+)|\1<\2>|g' "$file" || true

            # 3. Bilibili Fix: Added referrerpolicy to prevent the blank white box
            sed -i -E 's|\{%[[:space:]]*embed url=".*video/(BV[a-zA-Z0-9]+).*"[[:space:]]*%\}|\n\n<iframe src="https://bilibili.com\1\&page=1\&high_quality=1\&danmaku=0" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" style="width:100%; height:480px; display:block; margin:20px 0;" markdown="0" referrerpolicy="no-referrer"></iframe>\n\n|g' "$file" || true


            # 4. Cleanup: Remove any other leftover GitBook embed tags
            sed -i -E 's/\{%[[:space:]]*embed[^%]*%\}/ /g' "$file" || true

            # Convert internal sidebar links from .md to .html
            sed -i 's/\.md)/.html)/g' SUMMARY.md || true

          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
