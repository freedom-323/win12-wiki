name: Deploy GitBook Mirror to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preprocess GitBook Syntax
        run: |
          IFS=$'\n'
          # 1. Clean SUMMARY.md (Sidebar)
          if [ -f "SUMMARY.md" ]; then
            sed -i '/# Table of contents/d' SUMMARY.md || true
            sed -i 's/README.md/index.html/g' SUMMARY.md || true
            sed -i 's/\.md)/.html)/g' SUMMARY.md || true
          fi

          for file in $(find . -type f -name "*.md"); do
            echo "Processing $file..."

            # A. Fix Bold & Entities
            sed -i 's/&#x20;/ /g' "$file" || true

            # B. Force Clickable Links (Wrap raw https in < >)
            sed -i -E 's|([^<"'\''@])(https?://[a-zA-Z0-9\.\/\-_?=&%#]+)|\1<\2>|g' "$file" || true

            # C. THE DEFINITIVE BILIBILI FIX:
            # We use | as the delimiter so the slashes / in the URL are safe.
            # We use \& to escape the ampersands so sed treats them as literal characters.
            sed -i -E 's|\{%[[:space:]]*embed url=".*video/(BV[a-zA-Z0-9]+).*"[[:space:]]*%\}|\n\n<iframe src="//player.bilibili.com/player.html?isOutside=true\&aid=113882735711341\&bvid=\1\&cid=28052620619\&p=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" style="width:100%; height:480px; display:block; margin:20px 0;" markdown="0" referrerpolicy="no-referrer"></iframe>\n\n|g' "$file" || true

            # D. Support for other embeds (YouTube, etc.)
            sed -i -E 's|\{%[[:space:]]*embed url="([^"]+)"[[:space:]]*%\}|\n\n<iframe src="\1" style="width:100%; height:480px; display:block; margin:20px 0;" frameborder="0" allowfullscreen="true" markdown="0"></iframe>\n\n|g' "$file" || true

            # E. Styling Fixes (Description)
            if head -n 5 "$file" | grep -q "^description:"; then
              sed -i 's/^description:[[:space:]]*\(.*\)/ \n\n> _\1_ \n\n/g' "$file" || true
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
