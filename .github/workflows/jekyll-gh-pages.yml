name: Deploy GitBook Mirror to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preprocess GitBook Syntax
        run: |
          IFS=$'\n'
          for file in $(find . -type f -name "*.md"); do
            echo "Processing $file..."
            
            # 1. Fix special Bold / Space entities (&#x20;)
            sed -i 's/&#x20;/ /g' "$file" || true

            # 2. Convert {% embed url="..." %} to <iframe>
            # We do this BEFORE the description logic so it doesn't get messed up
            sed -i -E 's/\{%[[:space:]]*embed[[:space:]]+url=["'\'']([^"'\'']+)["'\''][[:space:]]*%\}/<iframe src="\1" width="100%" height="400" frameborder="0" allowfullscreen><\/iframe>/g' "$file" || true
            
            # 3. Format line 2 as description ONLY if it's NOT SUMMARY.md and NOT a video/tag
            if [[ "$file" != *"SUMMARY.md"* ]]; then
               # Only apply blockquote if the line actually contains text (not a tag or empty)
               sed -i '2{/^[^<{%]/s/^/> _/; /^[^<{%]/s/$/ _ <br>/}' "$file" || true
            fi

            # 4. Emergency cleanup for any missed 'embed' tags
            sed -i -E 's/\{%[[:space:]]*embed[^%]*%\}/<!-- GitBook Embed Removed -->/g' "$file" || true

            # 5. Convert GitBook {% hint %} to blockquotes
            sed -i 's/\{%[[:space:]]*hint[^%]*%\}/<blockquote><strong>Note:<\/strong><br>/g' "$file" || true
            sed -i 's/\{%[[:space:]]*endhint[[:space:]]*%\}/<\/blockquote>/g' "$file" || true
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
