name: Deploy GitBook Mirror to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preprocess GitBook Syntax
        run: |
          # Handle filenames with spaces by setting IFS to newline
          IFS=$'\n'
          for file in $(find . -type f -name "*.md"); do
            echo "Processing $file..."
            
            # 1. Convert {% embed url="..." %} to <iframe>
            sed -i -E 's/\{%[[:space:]]*embed[[:space:]]+url=["'\'']([^"'\'']+)["'\''][[:space:]]*%\}/<div class="video-container" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;margin:20px 0;"><iframe src="\1" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen><\/iframe><\/div>/g' "$file" || true
            
            # 2. Emergency cleanup for any missed 'embed' tags to prevent Jekyll crash
            sed -i -E 's/\{%[[:space:]]*embed[^%]*%\}/<!-- GitBook Embed Removed -->/g' "$file" || true

            # 3. Format line 2 as an italicized lead (description)
            sed -i '2s/^/> _/; 2s/$/ _ <br>/' "$file" || true

            # 4. Convert GitBook {% hint %} to blockquotes
            sed -i 's/\{%[[:space:]]*hint[^%]*%\}/<blockquote><strong>Note:<\/strong><br>/g' "$file" || true
            sed -i 's/\{%[[:space:]]*endhint[[:space:]]*%\}/<\/blockquote>/g' "$file" || true
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
