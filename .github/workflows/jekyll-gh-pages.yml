name: Deploy GitBook Mirror to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preprocess GitBook Content
        # We use 'find' and 'sed' to replace GitBook-specific tags with standard HTML
        # This prevents Jekyll from seeing 'Unknown tags'
        run: |
          # 1. Replace {% embed url="..." %} with a responsive iframe
          find . -type f -name "*.md" -exec sed -i -E 's/\{%[[:space:]]*embed url="([^"]+)"[[:space:]]*%\}/<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;margin:20px 0;"><iframe src="\1" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen><\/iframe><\/div>/g' {} +
          
          # 2. Convert line 2 (Description) into a blockquote/lead style for Primer
          find . -type f -name "*.md" -exec sed -i '2s/^/> _/; 2s/$/ _ <br>/' {} +

          # 3. Strip out other GitBook blocks like {% hint %} which also cause build errors
          find . -type f -name "*.md" -exec sed -i 's/{% hint style="[^"]*" %}/<blockquote><strong>Note:<\/strong><br>/g' {} +
          find . -type f -name "*.md" -exec sed -i 's/{% endhint %}/<\/blockquote>/g' {} +

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
