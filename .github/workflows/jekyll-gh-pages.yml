# Workflow for building and deploying a GitBook mirror to GitHub Pages
name: Deploy GitBook Mirror to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preprocess GitBook Syntax
        run: |
          # 1. Force remove any existing 'embed' tags that Jekyll doesn't understand.
          # The regex handles flexible spacing: {% embed url="..."  %}
          # It replaces them with a responsive HTML5 iframe.
          find . -type f -name "*.md" -exec sed -i -E 's/\{%[[:space:]]*embed url="([^"]+)"[[:space:]]*%\}/<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;margin-bottom:20px;"><iframe src="\1" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen><\/iframe><\/div>/g' {} +
          
          # 2. Format the GitBook description (line 2) to look like a 'lead' paragraph in Primer theme.
          # It wraps the text in italicized blockquotes.
          find . -type f -name "*.md" -exec sed -i '2s/^/> _/; 2s/$/ _ <br>/' {} +

          # 3. Optional: Fix GitBook Hints (info/warning boxes) so they don't break the build
          find . -type f -name "*.md" -exec sed -i 's/{% hint style="[^"]*" %}/<blockquote><strong>Note:<\/strong><br>/g' {} +
          find . -type f -name "*.md" -exec sed -i 's/{% endhint %}/<\/blockquote>/g' {} +

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
