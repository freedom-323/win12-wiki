name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- NEW PRE-PROCESSING STEP START ---
      - name: Fix GitBook Syntax (Video Embeds & Description)
        run: |
          # 1. Convert {% embed url="..." %} to HTML iframes
          find . -name "*.md" -exec sed -i -E 's/\{% embed url="([^"]+)" %\}/<div class="video-container"><iframe src="\1" width="100%" height="400px" frameborder="0" allowfullscreen><\/iframe><\/div>/g' {} +
          
          # 2. Convert GitBook description blocks to italicized blockquotes so Jekyll styles them
          # This looks for the first paragraph after a title and styles it
          find . -name "*.md" -exec sed -i '2s/^/> _/; 2s/$/ _/' {} +
      # --- NEW PRE-PROCESSING STEP END ---

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
