name: Deploy GitBook Mirror
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preprocess GitBook Syntax
        run: |
          # Fix Video Embeds
          find . -name "*.md" -exec sed -i -E 's/\{% embed url="([^"]+)" %\}/<iframe src="\1" width="100%" height="400px" frameborder="0" allowfullscreen><\/iframe>/g' {} +
          # Optional: Fix GitBook Hints/Alerts
          find . -name "*.md" -exec sed -i 's/{% hint style="info" %}/<div class="flash">/g' {} +
          find . -name "*.md" -exec sed -i 's/{% endhint %}/<\/div>/g' {} +

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
